# ============================================================================
# AEGIS-AI Frontend Nginx Configuration
# Production-grade Reverse Proxy & Web Server
# ============================================================================

# Run as unprivileged user
user nginx;

# Auto-detect number of CPU cores
worker_processes auto;

# Increase file descriptors
worker_rlimit_nofile 65535;

# Error log
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  # Optimizations
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ========================================================================
  # Logging
  # ========================================================================
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  log_format json escape=json
    '{'
      '"timestamp":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"request":"$request",'
      '"status":$status,'
      '"body_bytes_sent":$body_bytes_sent,'
      '"http_referer":"$http_referer",'
      '"http_user_agent":"$http_user_agent",'
      '"request_time":$request_time'
    '}';

  access_log /var/log/nginx/access.log json;

  # ========================================================================
  # Performance Optimizations
  # ========================================================================
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 20M;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types 
    text/plain 
    text/css 
    text/xml 
    text/javascript 
    application/json 
    application/javascript 
    application/xml+rss 
    application/rss+xml 
    font/truetype 
    font/opentype 
    application/vnd.ms-fontobject 
    image/svg+xml;

  # ========================================================================
  # Security Headers
  # ========================================================================
  map $sent_http_content_type $expires {
    default                    off;
    text/html                  epoch;
    text/css                   max;
    application/javascript     max;
    ~image/                    max;
    ~font/                     max;
  }

  # ========================================================================
  # Rate Limiting
  # ========================================================================
  limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
  limit_req_status 429;

  # ========================================================================
  # Upstream Backends
  # ========================================================================
  upstream backend {
    least_conn;
    server backend:3001 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  # ========================================================================
  # HTTP Server (Redirect to HTTPS in production)
  # ========================================================================
  server {
    listen 80;
    server_name _;

    # Health check endpoint for Docker/K8s
    location /health {
      access_log off;
      return 200 "healthy\n";
      add_header Content-Type text/plain;
    }

    # Redirect all traffic to HTTPS in production
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ========================================================================
  # HTTPS Server (Main Configuration)
  # ========================================================================
  server {
    listen 443 ssl http2;
    server_name aegis-ai.co.za www.aegis-ai.co.za;

    # ====================================================================
    # SSL/TLS Configuration
    # ====================================================================
    # Generate with: certbot certonly --webroot
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    
    # SSL protocols and ciphers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/nginx/ssl/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ====================================================================
    # Security Headers
    # ====================================================================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Content Security Policy
    add_header Content-Security-Policy "
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https:;
      connect-src 'self' https://api.aegis-ai.co.za https://jtohnfeqztmiamqmaiod.supabase.co;
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self'
    " always;

    # ====================================================================
    # Root & Index
    # ====================================================================
    root /usr/share/nginx/html;
    index index.html;

    # ====================================================================
    # Static Files
    # ====================================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      access_log off;
    }

    # ====================================================================
    # SPA Routing (Send all unknown routes to index.html)
    # ====================================================================
    location / {
      try_files $uri $uri/ /index.html;
      
      # Cache index.html separately
      add_header Cache-Control "public, max-age=0, must-revalidate";
      
      # Apply rate limiting
      limit_req zone=general burst=20 nodelay;
    }

    # ====================================================================
    # API Proxy
    # ====================================================================
    location /api/ {
      proxy_pass http://backend/api/;
      
      # Proxy headers
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Correlation-ID $request_id;
      
      # Timeouts
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
      
      # Buffering
      proxy_buffering on;
      proxy_buffer_size 4k;
      proxy_buffers 8 4k;
      
      # Keep-alive
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      
      # Rate limiting
      limit_req zone=api burst=10 nodelay;
    }

    # ====================================================================
    # Health Check
    # ====================================================================
    location /health {
      access_log off;
      return 200 "healthy\n";
      add_header Content-Type text/plain;
    }

    # ====================================================================
    # Deny Access to Sensitive Files
    # ====================================================================
    location ~ /\. {
      deny all;
      access_log off;
      log_not_found off;
    }

    location ~ ~$ {
      deny all;
      access_log off;
      log_not_found off;
    }

    # ====================================================================
    # Error Pages
    # ====================================================================
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
      root /usr/share/nginx/html;
    }
  }
}
