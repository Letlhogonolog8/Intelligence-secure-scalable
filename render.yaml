services:
  - type: web
    name: aegis-api
    env: node
    plan: starter
    autoDeploy: true
    buildCommand: npm ci && npm run build:server
    startCommand: npm run start
    healthCheckPath: /health/live
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: CORS_ORIGIN
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: CHAT_ENCRYPTION_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: TELKOM_WEBHOOK_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      - key: TELKOM_API_KEY
        sync: false
      - key: TELKOM_API_URL
        sync: false
      - key: TELKOM_USSD_CODE
        sync: false
      - key: TELKOM_CALLBACK_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: DATADOG_ENABLED
        sync: false
      - key: DATADOG_AGENT_HOST
        sync: false
      - key: DATADOG_AGENT_PORT
        sync: false
      - key: DATADOG_ENV
        sync: false
      - key: DATADOG_SERVICE
        sync: false
      - key: DATADOG_VERSION
        sync: false
