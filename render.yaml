services:
  - type: web
    name: aegis-backend
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm ci && npm run build:server
    startCommand: npm run start
    healthCheckPath: /health/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: VITE_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: CHAT_ENCRYPTION_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: BACKEND_PUBLIC_URL
        value: https://intelligence-secure-scalable-mwge.onrender.com
      - key: TELKOM_API_URL
        value: https://api.telkom.co.za/ussd/v1
      - key: TELKOM_API_KEY
        sync: false
      - key: TELKOM_USSD_CODE
        sync: false
      - key: TELKOM_CALLBACK_URL
        sync: false
      - key: TELKOM_WEBHOOK_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # The server reads HUGGINGFACE_API_TOKEN (powers AI chat + voice
      # transcription). The old HUGGINGFACE_API_KEY name was never read.
      - key: HUGGINGFACE_API_TOKEN
        sync: false
      - key: HUGGINGFACE_ASR_MODEL
        value: openai/whisper-large-v3-turbo
      - key: SENTRY_DSN
        sync: false
      - key: DATADOG_API_KEY
        sync: false
      # USSD service-code allowlist — without these the gateway accepts any code.
      - key: USSD_SERVICE_CODE
        value: "*135*1782#"
      - key: USSD_ALLOWED_SERVICE_CODES
        value: "*135*1782#,*384*30933#,*721#"
      # In-process queue drain (SOS push/SMS). Safe to run alongside replicas
      # since workers claim rows atomically before sending.
      - key: NOTIFICATION_WORKER_ENABLED
        value: "true"

  - type: web
    name: aegis-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://intelligence-secure-scalable-mwge.onrender.com/api
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
