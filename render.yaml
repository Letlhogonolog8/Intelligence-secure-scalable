services:
  - type: web
    name: aegis-backend
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm ci && npm run build:server
    startCommand: npm run start
    healthCheckPath: /health/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: VITE_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: CHAT_ENCRYPTION_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://aegis-ai-platform.vercel.app
      - key: BACKEND_PUBLIC_URL
        value: https://aegis-backend.onrender.com
      - key: TELKOM_API_URL
        value: https://api.telkom.co.za/ussd/v1
      - key: TELKOM_API_KEY
        sync: false
      - key: TELKOM_USSD_CODE
        sync: false
      - key: TELKOM_CALLBACK_URL
        sync: false
      - key: TELKOM_WEBHOOK_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      - key: NOTIFICATION_WORKER_ENABLED
        value: "false"

  - type: web
    name: aegis-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://aegis-backend.onrender.com/api
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
