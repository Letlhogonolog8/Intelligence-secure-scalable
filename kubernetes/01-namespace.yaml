apiVersion: v1
kind: Namespace
metadata:
  name: aegis
  labels:
    name: aegis
    monitoring: enabled
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: aegis-quota
  namespace: aegis
spec:
  hard:
    requests.cpu: "100"
    requests.memory: "200Gi"
    limits.cpu: "200"
    limits.memory: "400Gi"
    pods: "100"
---
apiVersion: v1
kind: NetworkPolicy
metadata:
  name: aegis-default-deny
  namespace: aegis
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: v1
kind: NetworkPolicy
metadata:
  name: aegis-allow-internal
  namespace: aegis
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {}
  egress:
  - to:
    - podSelector: {}
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 443
