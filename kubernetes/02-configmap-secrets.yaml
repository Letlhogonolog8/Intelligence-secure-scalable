apiVersion: v1
kind: ConfigMap
metadata:
  name: aegis-config
  namespace: aegis
data:
  ENVIRONMENT: "production"
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  PORT: "3001"
  CORS_ORIGIN: "https://aegis-ai.co.za"
  VITE_API_URL: "https://api.aegis-ai.co.za"
  VITE_DATADOG_ENABLED: "true"
  VITE_DATADOG_ENV: "production"
  VITE_DATADOG_VERSION: "1.0.0"
  VITE_DEPLOYMENT_REGION: "af-south-1"
  VITE_COUNTRY_CODE: "ZA"
  VITE_COMPLIANCE_FRAMEWORK: "POPIA"
  JWT_EXPIRY: "15m"
  REFRESH_TOKEN_EXPIRY: "7d"
  RATE_LIMIT_WINDOW_SECONDS: "900"
  RATE_LIMIT_MAX_REQUESTS: "50"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "aegis_db"
  CSP_REPORT_URI: "https://api.aegis-ai.co.za/api/csp-report"
  DATADOG_ENABLED: "false"
  DATADOG_AGENT_HOST: "localhost"
  DATADOG_AGENT_PORT: "8125"
  DATADOG_ENV: "production"
  DATADOG_SERVICE: "aegis-api"
  DATADOG_VERSION: "1.0.0"
  VITE_DATADOG_SERVICE: "aegis-web"
---
apiVersion: v1
kind: Secret
metadata:
  name: aegis-secrets
  namespace: aegis
type: Opaque
stringData:
  VITE_SUPABASE_URL: "https://your-project.supabase.co"
  VITE_SUPABASE_KEY: "your-anon-key"
  SUPABASE_SERVICE_ROLE_KEY: "your-service-role-key"
  ENCRYPTION_KEY: "your-32-byte-hex-key"
  CHAT_ENCRYPTION_KEY: "your-32-byte-hex-key"
  JWT_SECRET: "your-jwt-secret"
  REFRESH_TOKEN_SECRET: "your-refresh-token-secret"
  TELKOM_API_KEY: "your-telkom-api-key"
  TELKOM_API_URL: "https://api.telkom.co.za/ussd/v1"
  TELKOM_USSD_CODE: "your-approved-ussd-service-code"
  TELKOM_CALLBACK_URL: "https://api.aegis-ai.co.za/api/ussd/telkom/callback"
  TELKOM_WEBHOOK_SECRET: "your-telkom-secret"
  TWILIO_ACCOUNT_SID: "your-twilio-account-sid"
  TWILIO_AUTH_TOKEN: "your-twilio-auth-token"
  TWILIO_PHONE_NUMBER: "your-twilio-phone-number"
  TWILIO_WHATSAPP_NUMBER: "your-twilio-whatsapp-number"
  REDIS_PASSWORD: "your-redis-password"
  DB_USER: "aegis_user"
  DB_PASSWORD: "your-database-password"
  SENTRY_DSN: ""
  VITE_DATADOG_APPLICATION_ID: "your-datadog-app-id"
  VITE_DATADOG_CLIENT_TOKEN: "your-datadog-client-token"
---
apiVersion: v1
kind: Secret
metadata:
  name: tls-certificate
  namespace: aegis
type: kubernetes.io/tls
stringData:
  tls.crt: "replace-with-tls-certificate-pem"
  tls.key: "replace-with-tls-private-key-pem"
