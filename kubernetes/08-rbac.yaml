apiVersion: v1
kind: ServiceAccount
metadata:
  name: aegis-api
  namespace: aegis
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aegis-api-role
  namespace: aegis
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aegis-api-rolebinding
  namespace: aegis
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aegis-api-role
subjects:
- kind: ServiceAccount
  name: aegis-api
  namespace: aegis
