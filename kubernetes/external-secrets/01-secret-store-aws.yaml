# External Secrets Operator — AWS Secrets Manager backend
# -----------------------------------------------------------
# Pre-requisites:
#   1. Install External Secrets Operator (ESO) into the cluster:
#        helm repo add external-secrets https://charts.external-secrets.io
#        helm install external-secrets external-secrets/external-secrets \
#          -n external-secrets --create-namespace
#   2. Create an IAM user/role with read access to the relevant Secrets
#      Manager prefix (e.g. arn:aws:secretsmanager:af-south-1:123456789012:secret:aegis/*).
#   3. Either supply IRSA on the ServiceAccount or store AWS creds in a Secret
#      called `aws-secret-creds` (referenced below).
#
# After applying this file together with the ExternalSecret manifests, ESO
# pulls values from AWS Secrets Manager every refreshInterval and projects
# them into the `aegis-secrets` Kubernetes Secret consumed by the API and
# worker Deployments — replacing the placeholder values currently in
# kubernetes/02-configmap-secrets.yaml.

apiVersion: v1
kind: Secret
metadata:
  name: aws-secret-creds
  namespace: aegis
type: Opaque
stringData:
  # Replace these from your AWS IAM user. Prefer IRSA (delete this Secret then).
  access-key: REPLACE_WITH_AWS_ACCESS_KEY_ID
  secret-access-key: REPLACE_WITH_AWS_SECRET_ACCESS_KEY
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aegis-aws-secrets
  namespace: aegis
spec:
  provider:
    aws:
      service: SecretsManager
      region: af-south-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-secret-creds
            key: access-key
          secretAccessKeySecretRef:
            name: aws-secret-creds
            key: secret-access-key
