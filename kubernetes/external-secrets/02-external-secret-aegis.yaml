# Pulls all AEGIS-AI runtime secrets from AWS Secrets Manager and projects
# them into the `aegis-secrets` Kubernetes Secret consumed by the API and
# worker Deployments. The shape of the Secret stays identical to
# kubernetes/02-configmap-secrets.yaml so the Deployments do not need any
# changes.
#
# In AWS Secrets Manager, create ONE secret per logical environment, e.g.
#   /aegis/production
# whose JSON value is:
#   {
#     "VITE_SUPABASE_URL":            "...",
#     "VITE_SUPABASE_KEY":            "...",
#     "SUPABASE_SERVICE_ROLE_KEY":    "...",
#     "ENCRYPTION_KEY":               "...",
#     "CHAT_ENCRYPTION_KEY":          "...",
#     "JWT_SECRET":                   "...",
#     "REFRESH_TOKEN_SECRET":         "...",
#     "TELKOM_API_KEY":               "...",
#     "TELKOM_API_URL":               "...",
#     "TELKOM_USSD_CODE":             "...",
#     "TELKOM_CALLBACK_URL":          "...",
#     "TELKOM_WEBHOOK_SECRET":        "...",
#     "TWILIO_ACCOUNT_SID":           "...",
#     "TWILIO_AUTH_TOKEN":            "...",
#     "TWILIO_PHONE_NUMBER":          "...",
#     "TWILIO_WHATSAPP_NUMBER":       "...",
#     "REDIS_PASSWORD":               "...",
#     "DB_USER":                      "...",
#     "DB_PASSWORD":                  "...",
#     "SENTRY_DSN":                   "...",
#     "VITE_DATADOG_APPLICATION_ID":  "...",
#     "VITE_DATADOG_CLIENT_TOKEN":    "..."
#   }
#
# The DELETION_POLICY=Retain prevents ESO from deleting the live Secret if
# this manifest is ever removed — important because a brief secret outage
# would crash every API replica.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: aegis-secrets
  namespace: aegis
spec:
  refreshInterval: 30m
  secretStoreRef:
    name: aegis-aws-secrets
    kind: SecretStore
  target:
    name: aegis-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: /aegis/production
