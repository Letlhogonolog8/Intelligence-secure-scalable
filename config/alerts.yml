groups:
  - name: aegis_critical_alerts
    interval: 30s
    rules:
      - alert: APIDown
        expr: up{job="aegis-api"} == 0
        for: 1m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "AEGIS API is down"
          description: "AEGIS API has been unavailable for more than 1 minute"
          action: "Check API pod status, logs, and restart if necessary"

      - alert: APIHighErrorRate
        expr: sum(rate(http_requests_total{status_code=~"5.."}[5m])) / clamp_min(sum(rate(http_requests_total[5m])), 0.001) > 0.05
        for: 5m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "High error rate detected on API"
          description: "5xx responses exceed 5% of total API traffic"
          action: "Check application logs for errors"

      - alert: APIHighLatency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_ms_bucket[5m])) by (le)) > 1000
        for: 5m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "API latency is critically high"
          description: "P95 latency is above 1000ms"
          action: "Check database queries, external API calls, and optimize bottlenecks"

      - alert: DatabaseDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "PostgreSQL exporter is down"
          description: "PostgreSQL metrics have been unreachable for more than 1 minute"
          action: "Check PostgreSQL status and postgres-exporter connectivity"

      - alert: DatabaseSlowQueries
        expr: histogram_quantile(0.99, sum(rate(db_query_duration_ms_bucket[5m])) by (le)) > 5000
        for: 5m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Database queries are taking too long"
          description: "P99 query duration is above 5000ms"
          action: "Analyze query execution plans and add indexes if needed"

      - alert: EncryptionErrorsDetected
        expr: increase(encryption_errors_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
          component: security
        annotations:
          summary: "Encryption errors detected"
          description: "Encryption errors occurred in the last 5 minutes"
          action: "Check encryption service and verify keys are correct"

      - alert: AuditLogInsertionFailure
        expr: increase(audit_log_entries_total{status="failed"}[5m]) > 0
        for: 1m
        labels:
          severity: critical
          component: audit
        annotations:
          summary: "Audit log insertion failure"
          description: "Audit log write failures were recorded in the last 5 minutes"
          action: "Check database connectivity and audit log table status"

  - name: aegis_warning_alerts
    interval: 60s
    rules:
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "Redis exporter is down"
          description: "Redis metrics have been unreachable for more than 1 minute"
          action: "Check Redis service status and redis-exporter connectivity"

      - alert: RedisHighMemoryUsage
        expr: redis_memory_used_bytes / clamp_min(redis_memory_max_bytes, 1) > 0.9
        for: 5m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "Redis memory usage is critical"
          description: "Redis is using more than 90% of configured max memory"
          action: "Increase Redis max memory or clear old cache entries"

      - alert: HighAuthenticationFailureRate
        expr: sum(rate(authentication_failures_total[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
          component: security
        annotations:
          summary: "High authentication failure rate detected"
          description: "Authentication failures exceed 0.1 events per second"
          action: "Check for brute force attempts and review user credentials"

      - alert: HighRateLimitViolations
        expr: sum(rate(rate_limit_exceeded_total[5m])) > 0.01
        for: 5m
        labels:
          severity: warning
          component: security
        annotations:
          summary: "Rate limit being exceeded frequently"
          description: "Rate limit violations exceed 0.01 events per second"
          action: "Check for abusive clients and review rate limit thresholds"

      - alert: DataValidationErrors
        expr: sum(rate(data_validation_errors_total[5m])) > 0.01
        for: 5m
        labels:
          severity: warning
          component: validation
        annotations:
          summary: "High rate of data validation errors"
          description: "Validation errors exceed 0.01 events per second"
          action: "Review request validation rules and check client implementations"

      - alert: EscalationFailureRate
        expr: sum(rate(escalations_total{category=~"failed|error|delivery_failed|workflow_failed"}[5m])) / clamp_min(sum(rate(escalations_total[5m])), 0.001) > 0.1
        for: 5m
        labels:
          severity: warning
          component: escalation
        annotations:
          summary: "High escalation failure rate"
          description: "Failure-related escalation categories exceed 10% of escalation traffic"
          action: "Check escalation workflow, notification delivery, and database permissions"

      - alert: WebhookFailures
        expr: sum(rate(webhook_failures_total[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
          component: webhook
        annotations:
          summary: "Webhook failures detected"
          description: "Webhook failures exceed 0.05 events per second"
          action: "Check webhook provider status and verify credentials"

      - alert: USSDHighSessionCount
        expr: sum(ussd_sessions_active) > 1000
        for: 5m
        labels:
          severity: warning
          component: ussd
        annotations:
          summary: "High USSD session count"
          description: "More than 1000 active USSD sessions are open"
          action: "Monitor USSD capacity and prepare for scaling"

      - alert: HighDiskUsage
        expr: node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"} < 0.1
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "Disk space running out"
          description: "Less than 10% disk space is available on a monitored filesystem"
          action: "Clean up old logs/data or expand disk"

      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes > 2147483648
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High memory usage detected"
          description: "Process memory usage is above 2GiB"
          action: "Check for memory leaks and restart the service if needed"

      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High CPU usage detected"
          description: "Process CPU usage is above 0.8 CPU-seconds per second"
          action: "Check for expensive operations and optimize code"

      - alert: MFAServiceDown
        expr: increase(mfa_attempts_total{status="failed"}[5m]) > 10
        for: 5m
        labels:
          severity: warning
          component: mfa
        annotations:
          summary: "MFA service experiencing issues"
          description: "More than 10 MFA attempts failed in the last 5 minutes"
          action: "Check MFA service health and verify credentials"

      - alert: SlowTaskProcessing
        expr: histogram_quantile(0.95, sum(rate(task_processing_time_ms_bucket[5m])) by (le)) > 10000
        for: 10m
        labels:
          severity: warning
          component: tasks
        annotations:
          summary: "Task processing is slow"
          description: "P95 task processing time is above 10000ms"
          action: "Review task queue and optimize processing logic"

      - alert: LargeTaskQueue
        expr: sum(task_queue_size) > 1000
        for: 10m
        labels:
          severity: warning
          component: tasks
        annotations:
          summary: "Task queue is growing"
          description: "More than 1000 tasks are pending across queues"
          action: "Scale up task workers or optimize task processing"

      - alert: SessionMisalignment
        expr: increase(authentication_failures_total{reason="session_not_found"}[5m]) > 5
        for: 5m
        labels:
          severity: warning
          component: sessions
        annotations:
          summary: "Session management issues"
          description: "Session lookup failures exceeded 5 in the last 5 minutes"
          action: "Check session store connectivity and investigate expiration issues"

  - name: aegis_info_alerts
    interval: 5m
    rules:
      - alert: WeeklyMaintenanceWindow
        expr: day_of_week(vector(time())) == 0 and hour(vector(time())) >= 2 and hour(vector(time())) < 4
        for: 1m
        labels:
          severity: info
          component: maintenance
        annotations:
          summary: "Weekly maintenance window"
          description: "Scheduled maintenance is in progress"
          action: "Monitor for any issues during maintenance"
