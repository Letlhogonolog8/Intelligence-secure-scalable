groups:
  - name: aegis_recording_rules
    interval: 30s
    rules:
      # Request rate by endpoint
      - record: aegis:http:request_rate:5m
        expr: rate(http_requests_total[5m])

      - record: aegis:http:error_rate:5m
        expr: rate(http_requests_total{status=~"5.."}[5m])

      - record: aegis:http:success_rate:5m
        expr: rate(http_requests_total{status=~"2.."}[5m])

      # Request latency percentiles
      - record: aegis:http:latency:p50:5m
        expr: histogram_quantile(0.5, rate(http_request_duration_ms_bucket[5m]))

      - record: aegis:http:latency:p95:5m
        expr: histogram_quantile(0.95, rate(http_request_duration_ms_bucket[5m]))

      - record: aegis:http:latency:p99:5m
        expr: histogram_quantile(0.99, rate(http_request_duration_ms_bucket[5m]))

      # Database metrics
      - record: aegis:db:query_rate:5m
        expr: rate(db_queries_total[5m])

      - record: aegis:db:error_rate:5m
        expr: rate(db_queries_total{status="failed"}[5m])

      - record: aegis:db:latency:p95:5m
        expr: histogram_quantile(0.95, rate(db_query_duration_ms_bucket[5m]))

      - record: aegis:db:latency:p99:5m
        expr: histogram_quantile(0.99, rate(db_query_duration_ms_bucket[5m]))

      # Cache metrics
      - record: aegis:cache:hit_ratio:5m
        expr: |
          sum(rate(cache_hits[5m])) /
          (sum(rate(cache_hits[5m])) + sum(rate(cache_misses[5m])))

      - record: aegis:cache:miss_rate:5m
        expr: rate(cache_misses[5m])

      # Authentication metrics
      - record: aegis:auth:failure_rate:5m
        expr: rate(authentication_failures_total[5m])

      - record: aegis:auth:failure_ratio:5m
        expr: |
          rate(authentication_failures_total[5m]) /
          (rate(http_requests_total{path=~"/api/auth.*"}[5m]) + 1e-12)

      # MFA metrics
      - record: aegis:mfa:attempt_rate:5m
        expr: rate(mfa_attempts_total[5m])

      - record: aegis:mfa:success_rate:5m
        expr: rate(mfa_attempts_total{status="success"}[5m])

      # Rate limiting metrics
      - record: aegis:ratelimit:violation_rate:5m
        expr: rate(rate_limit_exceeded_total[5m])

      # Escalation metrics
      - record: aegis:escalation:rate:5m
        expr: rate(escalations_total[5m])

      - record: aegis:escalation:failure_rate:5m
        expr: rate(escalations_total{status="failed"}[5m])

      - record: aegis:escalation:by_severity:5m
        expr: rate(escalations_total[5m]) by (severity)

      # USSD metrics
      - record: aegis:ussd:active_sessions
        expr: ussd_sessions_active

      - record: aegis:ussd:session_creation_rate:5m
        expr: rate(ussd_sessions_total[5m])

      # Webhook metrics
      - record: aegis:webhook:processing_rate:5m
        expr: rate(webhook_processing_time_count[5m])

      - record: aegis:webhook:failure_rate:5m
        expr: rate(webhook_failures_total[5m])

      - record: aegis:webhook:latency:p95:5m
        expr: histogram_quantile(0.95, rate(webhook_processing_time_bucket[5m]))

      # Data validation metrics
      - record: aegis:validation:error_rate:5m
        expr: rate(data_validation_errors_total[5m])

      # Task queue metrics
      - record: aegis:task:queue_depth
        expr: task_queue_size

      - record: aegis:task:processing_rate:5m
        expr: rate(task_processing_time_count[5m])

      - record: aegis:task:processing_latency:p95:5m
        expr: histogram_quantile(0.95, rate(task_processing_time_bucket[5m]))

      # Audit logging metrics
      - record: aegis:audit:entry_rate:5m
        expr: rate(audit_log_entries_total[5m])

      - record: aegis:audit:entry_rate:by_action:5m
        expr: rate(audit_log_entries_total[5m]) by (action)

      # System metrics by instance
      - record: aegis:system:cpu_usage:5m
        expr: rate(process_cpu_seconds_total[5m]) * 100

      - record: aegis:system:memory_bytes
        expr: process_resident_memory_bytes

      - record: aegis:system:memory_percent:5m
        expr: (process_resident_memory_bytes / 1024 / 1024 / 1024) * 100

      - record: aegis:system:disk_available_percent
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100
