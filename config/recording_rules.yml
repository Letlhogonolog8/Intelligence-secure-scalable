groups:
  - name: aegis_recording_rules
    interval: 30s
    rules:
      - record: aegis:http:request_rate:5m
        expr: sum(rate(http_requests_total[5m]))

      - record: aegis:http:error_rate:5m
        expr: sum(rate(http_requests_total{status_code=~"5.."}[5m]))

      - record: aegis:http:success_rate:5m
        expr: sum(rate(http_requests_total{status_code=~"2.."}[5m]))

      - record: aegis:http:latency:p50:5m
        expr: histogram_quantile(0.5, sum(rate(http_request_duration_ms_bucket[5m])) by (le))

      - record: aegis:http:latency:p95:5m
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_ms_bucket[5m])) by (le))

      - record: aegis:http:latency:p99:5m
        expr: histogram_quantile(0.99, sum(rate(http_request_duration_ms_bucket[5m])) by (le))

      - record: aegis:db:query_rate:5m
        expr: sum(rate(db_queries_total[5m]))

      - record: aegis:db:error_rate:5m
        expr: sum(rate(db_queries_total{status="failed"}[5m]))

      - record: aegis:db:latency:p95:5m
        expr: histogram_quantile(0.95, sum(rate(db_query_duration_ms_bucket[5m])) by (le))

      - record: aegis:db:latency:p99:5m
        expr: histogram_quantile(0.99, sum(rate(db_query_duration_ms_bucket[5m])) by (le))

      - record: aegis:cache:hit_ratio:5m
        expr: sum(rate(cache_hits_total[5m])) / clamp_min(sum(rate(cache_hits_total[5m])) + sum(rate(cache_misses_total[5m])), 0.001)

      - record: aegis:cache:miss_rate:5m
        expr: sum(rate(cache_misses_total[5m]))

      - record: aegis:auth:failure_rate:5m
        expr: sum(rate(authentication_failures_total[5m]))

      - record: aegis:auth:failure_ratio:5m
        expr: sum(rate(authentication_failures_total[5m])) / clamp_min(sum(rate(http_requests_total{route=~"/api/auth.*"}[5m])), 0.001)

      - record: aegis:mfa:attempt_rate:5m
        expr: sum(rate(mfa_attempts_total[5m]))

      - record: aegis:mfa:success_rate:5m
        expr: sum(rate(mfa_attempts_total{status="success"}[5m]))

      - record: aegis:ratelimit:violation_rate:5m
        expr: sum(rate(rate_limit_exceeded_total[5m]))

      - record: aegis:escalation:rate:5m
        expr: sum(rate(escalations_total[5m]))

      - record: aegis:escalation:failure_rate:5m
        expr: sum(rate(escalations_total{category=~"failed|error|delivery_failed|workflow_failed"}[5m]))

      - record: aegis:escalation:by_severity:5m
        expr: sum(rate(escalations_total[5m])) by (severity)

      - record: aegis:ussd:active_sessions
        expr: sum(ussd_sessions_active)

      - record: aegis:webhook:processing_rate:5m
        expr: sum(rate(webhook_processing_time_ms_count[5m]))

      - record: aegis:webhook:failure_rate:5m
        expr: sum(rate(webhook_failures_total[5m]))

      - record: aegis:webhook:latency:p95:5m
        expr: histogram_quantile(0.95, sum(rate(webhook_processing_time_ms_bucket[5m])) by (le))

      - record: aegis:validation:error_rate:5m
        expr: sum(rate(data_validation_errors_total[5m]))

      - record: aegis:task:queue_depth
        expr: sum(task_queue_size)

      - record: aegis:task:processing_rate:5m
        expr: sum(rate(task_processing_time_ms_count[5m]))

      - record: aegis:task:processing_latency:p95:5m
        expr: histogram_quantile(0.95, sum(rate(task_processing_time_ms_bucket[5m])) by (le))

      - record: aegis:audit:entry_rate:5m
        expr: sum(rate(audit_log_entries_total[5m]))

      - record: aegis:audit:entry_rate:by_action:5m
        expr: sum(rate(audit_log_entries_total[5m])) by (action)

      - record: aegis:system:cpu_usage:5m
        expr: rate(process_cpu_seconds_total[5m]) * 100

      - record: aegis:system:memory_bytes
        expr: process_resident_memory_bytes

      - record: aegis:system:memory_percent:5m
        expr: (process_resident_memory_bytes / 2147483648) * 100

      - record: aegis:system:disk_available_percent
        expr: min((node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) * 100)
