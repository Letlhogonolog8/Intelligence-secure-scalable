services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - NODE_ENV=production
        - VITE_ENV=production
        - VITE_API_URL=${VITE_API_URL:-https://your-backend-domain.com/api}
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_KEY=${VITE_SUPABASE_KEY}
        - VITE_DATADOG_ENABLED=${VITE_DATADOG_ENABLED:-false}
        - VITE_DATADOG_APPLICATION_ID=${VITE_DATADOG_APPLICATION_ID:-}
        - VITE_DATADOG_CLIENT_TOKEN=${VITE_DATADOG_CLIENT_TOKEN:-}
        - VITE_DATADOG_SERVICE=${VITE_DATADOG_SERVICE:-aegis-web}
        - VITE_DATADOG_ENV=${VITE_DATADOG_ENV:-production}
        - VITE_DATADOG_VERSION=${VITE_DATADOG_VERSION:-1.0.0}
    image: aegis-frontend:latest
    container_name: aegis-frontend-prod
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - aegis-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/run
      - /var/cache
      - /var/log

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        - NODE_ENV=production
    image: aegis-backend:latest
    container_name: aegis-backend-prod
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CORS_ORIGIN=${CORS_ORIGIN:-https://yourdomain.com}
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_KEY=${VITE_SUPABASE_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - CHAT_ENCRYPTION_KEY=${CHAT_ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - JWT_EXPIRY=${JWT_EXPIRY:-15m}
      - REFRESH_TOKEN_EXPIRY=${REFRESH_TOKEN_EXPIRY:-7d}
      - MFA_ISSUER=${MFA_ISSUER}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=aegis_cache
      - DB_USER=aegis
      - DB_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - NOTIFICATION_WORKER_INTERVAL_MS=${NOTIFICATION_WORKER_INTERVAL_MS:-15000}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - TWILIO_WHATSAPP_NUMBER=${TWILIO_WHATSAPP_NUMBER:-}
      - TELKOM_API_KEY=${TELKOM_API_KEY:-}
      - TELKOM_API_URL=${TELKOM_API_URL:-https://api.telkom.co.za/ussd/v1}
      - TELKOM_USSD_CODE=${TELKOM_USSD_CODE:-}
      - BACKEND_PUBLIC_URL=${BACKEND_PUBLIC_URL:-}
      - TELKOM_CALLBACK_URL=${TELKOM_CALLBACK_URL:-}
      - TELKOM_WEBHOOK_SECRET=${TELKOM_WEBHOOK_SECRET}
      - DATADOG_ENABLED=${DATADOG_ENABLED:-false}
      - DATADOG_ENV=${DATADOG_ENV:-production}
      - DATADOG_SERVICE=${DATADOG_SERVICE:-aegis-api}
      - DATADOG_VERSION=${DATADOG_VERSION:-1.0.0}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - NOTIFICATION_WORKER_ENABLED=false
    networks:
      - aegis-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health/ready', (r) => {if (r.statusCode !== 200) process.exit(1); process.exit(0)}).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        - NODE_ENV=production
    image: aegis-worker:latest
    container_name: aegis-worker-prod
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    command: ["node", "dist/server/worker.js"]
    environment:
      - NODE_ENV=production
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - TWILIO_WHATSAPP_NUMBER=${TWILIO_WHATSAPP_NUMBER:-}
      - BACKEND_PUBLIC_URL=${BACKEND_PUBLIC_URL:-}
      - NOTIFICATION_WORKER_ENABLED=true
      - NOTIFICATION_WORKER_INTERVAL_MS=${NOTIFICATION_WORKER_INTERVAL_MS:-15000}
      - NOTIFICATION_WORKER_BATCH_SIZE=${NOTIFICATION_WORKER_BATCH_SIZE:-25}
    networks:
      - aegis-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:16-alpine
    container_name: aegis-postgres
    restart: always
    environment:
      - POSTGRES_USER=aegis
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=aegis_cache
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aegis-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    container_name: aegis-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    networks:
      - aegis-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-changeme} --raw ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
  redis_data:

networks:
  aegis-network:
    driver: bridge
